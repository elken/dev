<article class="text-lg prose dark:prose-invert prose-slate lg:prose-lg prose-a:no-underline max-w-none">
    {% if image %}
    <img src="{{ image }}" alt="{{ image-alt }}"
        class="absolute top-0 left-0 rounded-t h-40 w-full mb-0 object-cover object-center">
    <div class="grayscale">
        <h1 class="image-title mb-0">{{ title }}</h1>
        {% if description %}
        <h5 class="image-title text-lg font-semibold mt-1 mb-6">{{ description }}</h5>
        {% endif %}
    </div>
    {% else %}
    <h1 class="mb-0">{{ title }}</h1>

    {% if description %}
    <h5 class="text-nord-1 dark:text-nord-4 text-lg font-semibold mt-1 mb-6">{{ description }}</h5>
    {% endif %}
    {% endif %}

    <span class="flex flex-col sm:flex-row gap-3 items-center">
        <span class="select-none">
            <i class="fas fa-calendar-alt"></i>
            {{ date }}
        </span>

        {% if tags %}
        {% for tag in tags %}
        <a class="bg-nord-9 !text-nord-6 text-xs font-medium mr-2 px-2.5 py-0.5 rounded"
            href="tags/{{tag|escape-tag}}{{page-suffix}}">
            <svg xmlns=" http://www.w3.org/2000/svg" class="inline fill-nord-10" height="1em" viewBox="0 0 448 512">
                <path
                    d="M0 80V229.5c0 17 6.7 33.3 18.7 45.3l176 176c25 25 65.5 25 90.5 0L418.7 317.3c25-25 25-65.5 0-90.5l-176-176c-12-12-28.3-18.7-45.3-18.7H48C21.5 32 0 53.5 0 80zm112 32a32 32 0 1 1 0 64 32 32 0 1 1 0-64z" />
            </svg>
            {{ tag }}
        </a>
        {% endfor %}
        {% endif %}
    </span>

    {{body | safe}}

</article>

<script id="comments" src="https://giscus.app/client.js" data-repo="elken/dev" data-repo-id="R_kgDOK4IZYw"
    data-category="Ideas" data-category-id="DIC_kwDOK4IZY84CbpI1" data-mapping="pathname" data-strict="0"
    data-reactions-enabled="1" data-emit-metadata="0" data-input-position="top" data-theme="preferred_color_scheme"
    data-lang="en" crossorigin="anonymous" async>

    </script>

<script type="text/javascript">
    document.getElementById("comments").addEventListener("load", function () {
        const iframe = document.querySelector('iframe.giscus-frame');
        iframe.onload = function () {
            sendMessage({ setConfig: { theme: localStorage.getItem('color-theme') } })
        }
    });
</script>
